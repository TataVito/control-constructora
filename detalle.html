<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle — RVC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { rvc: { DEFAULT: '#C1272D', dark: '#A01F24', light: '#D94F54' } } } }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <header class="bg-rvc text-white px-4 py-3 shadow">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="defectos.html" class="text-red-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <img src="rvc.jpg" alt="RVC" class="h-9 w-9 rounded-lg object-contain bg-white p-0.5 flex-shrink-0">
        <h1 class="text-lg font-bold">Detalle</h1>
      </div>
      <a id="btnEditar" href="#" class="text-red-200 text-sm font-medium">Editar</a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pt-5 space-y-4" id="contenido">
    <p class="text-gray-400 text-sm">Cargando...</p>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 z-10">
    <a href="index.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
      Inicio
    </a>
    <a href="defectos.html" class="flex flex-col items-center text-xs" style="color:#C1272D">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Defectos
    </a>
    <a href="analisis.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Análisis
    </a>
    <a href="gremios-admin.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      Gremios
    </a>
    <a href="nuevo.html" class="flex flex-col items-center text-xs text-gray-400">
      <div class="rounded-full p-1 -mt-4 shadow-lg" style="background:#C1272D">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      </div>
      Nuevo
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const defectoId = parseInt(getParam('id'));

    async function cambiarEstado(id, estado) {
      try {
        const d = await DB.getDefecto(id);
        d.estado = estado;
        await DB.saveDefecto(d);
        render();
      } catch(e) {
        alert('Error al cambiar estado: ' + e.message);
      }
    }

    async function render() {
      try {
        const d = await DB.getDefecto(defectoId);
        document.getElementById('btnEditar').href = `nuevo.html?id=${d.id}`;

        const btnEstilo = (est) => {
          const map = {
            abierto:    { a: '#ef4444' },
            en_proceso: { a: '#f59e0b' },
            cerrado:    { a: '#22c55e' }
          };
          const active = d.estado === est;
          return active
            ? `background:${map[est].a};color:#fff;border-color:${map[est].a}`
            : `background:#fff;color:#6b7280;border-color:#e5e7eb`;
        };

        const comentarios = d.comentarios || [];
        const borderColor = { abierto: 'border-red-400', en_proceso: 'border-yellow-400', cerrado: 'border-green-400' };

        document.getElementById('contenido').innerHTML = `
          ${d.foto ? `<img src="${d.foto}" class="w-full rounded-xl object-cover max-h-64 shadow-sm">` : ''}

          <div class="bg-white rounded-xl shadow-sm p-4 space-y-3">
            <div class="flex items-start justify-between gap-3">
              <h2 class="text-base font-semibold text-gray-800 leading-snug">${d.descripcion}</h2>
              ${badge(d.estado)}
            </div>

            <div class="grid grid-cols-2 gap-3 text-sm">
              <div>
                <p class="text-xs text-gray-400 mb-0.5">Obra</p>
                <p class="font-medium" style="color:#C1272D">${d.obra || '—'}</p>
              </div>
              <div>
                <p class="text-xs text-gray-400 mb-0.5">Fecha</p>
                <p class="font-medium text-gray-700">${fmtDate(d.fecha)}</p>
              </div>
              <div>
                <p class="text-xs text-gray-400 mb-0.5">Gremio</p>
                <p class="font-medium text-gray-700">${d.gremio}</p>
              </div>
              <div>
                <p class="text-xs text-gray-400 mb-0.5">Zona</p>
                <p class="font-medium text-gray-700">${d.zona}</p>
              </div>
            </div>

            ${d.notas ? `<div>
              <p class="text-xs text-gray-400 mb-0.5">Notas</p>
              <p class="text-sm text-gray-600">${d.notas}</p>
            </div>` : ''}
          </div>

          ${comentarios.length ? `<div class="bg-white rounded-xl shadow-sm p-4">
            <p class="text-sm font-medium text-gray-600 mb-3">Historial del especialista</p>
            <div class="space-y-3">
              ${comentarios.map(c => `
                <div class="border-l-2 pl-3 ${borderColor[c.estadoNuevo] || 'border-gray-300'}">
                  <div class="flex items-center gap-2 mb-1">
                    ${badge(c.estadoNuevo)}
                    <span class="text-xs text-gray-400">${fmtDate(c.fecha)}</span>
                  </div>
                  ${c.texto ? `<p class="text-sm text-gray-600">${c.texto}</p>` : ''}
                  ${c.foto ? `<img src="${c.foto}" class="mt-2 rounded-lg max-h-40 object-cover w-full">` : ''}
                </div>`).join('')}
            </div>
          </div>` : ''}

          <div class="bg-white rounded-xl shadow-sm p-4">
            <p class="text-sm font-medium text-gray-600 mb-3">Cambiar estado</p>
            <div class="flex gap-2">
              <button onclick="cambiarEstado(${d.id},'abierto')"    style="${btnEstilo('abierto')}"    class="flex-1 py-2 rounded-lg text-sm font-medium border transition">Abierto</button>
              <button onclick="cambiarEstado(${d.id},'en_proceso')" style="${btnEstilo('en_proceso')}" class="flex-1 py-2 rounded-lg text-sm font-medium border transition">En proceso</button>
              <button onclick="cambiarEstado(${d.id},'cerrado')"    style="${btnEstilo('cerrado')}"    class="flex-1 py-2 rounded-lg text-sm font-medium border transition">Cerrado</button>
            </div>
          </div>
        `;
      } catch(e) {
        document.getElementById('contenido').innerHTML = '<p class="text-red-400">Defecto no encontrado</p>';
      }
    }

    render();
  </script>
</body>
</html>
