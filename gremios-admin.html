<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Especialidades — RVC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { rvc: { DEFAULT: '#C1272D', dark: '#A01F24' } } } }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <header class="bg-rvc text-white px-4 py-3 shadow">
    <div class="flex items-center gap-3">
      <img src="rvc.jpg" alt="RVC" class="h-9 w-9 rounded-lg object-contain bg-white p-0.5 flex-shrink-0">
      <h1 class="text-lg font-bold">Especialidades</h1>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pt-5 space-y-4">

    <!-- Lista -->
    <div class="bg-white rounded-xl shadow-sm p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-gray-700">Especialidades activas</h2>
        <a href="gremio.html" class="text-xs font-medium" style="color:#C1272D">Ver portal →</a>
      </div>
      <div id="listaGremios" class="divide-y divide-gray-100">
        <p class="text-sm text-gray-400 py-2">Cargando...</p>
      </div>
    </div>

    <!-- Añadir -->
    <div class="bg-white rounded-xl shadow-sm p-4">
      <p class="text-sm font-medium text-gray-600 mb-3">Nueva especialidad</p>
      <div class="flex items-center gap-3">
        <label class="cursor-pointer flex-shrink-0">
          <input type="file" id="fotoNuevaInput" accept="image/*" class="hidden" onchange="previewFotoNueva(this)">
          <div id="previewNueva" class="w-12 h-12 rounded-xl flex items-center justify-center border-2 border-dashed border-gray-200 hover:border-red-300 transition overflow-hidden" style="background:#f9fafb">
            <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </div>
        </label>
        <input id="inputNuevo" type="text" placeholder="Ej: Cerrajería..."
          class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"
          onkeydown="if(event.key==='Enter') agregarGremio()">
        <button onclick="agregarGremio()"
          class="text-white text-sm font-semibold px-4 py-2 rounded-lg flex-shrink-0" style="background:#C1272D">
          Añadir
        </button>
      </div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 z-10">
    <a href="index.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
      Inicio
    </a>
    <a href="defectos.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Defectos
    </a>
    <a href="analisis.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Análisis
    </a>
    <a href="gremios-admin.html" class="flex flex-col items-center text-xs" style="color:#C1272D">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      Gremios
    </a>
    <a href="nuevo.html" class="flex flex-col items-center text-xs text-gray-400">
      <div class="rounded-full p-1 -mt-4 shadow-lg" style="background:#C1272D">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      </div>
      Nuevo
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let gremios    = [];
    let editandoId = null;
    let snapEdit   = null;
    let fotoNueva  = null;

    const camIcon = `<svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>`;

    function fotoThumb(foto, clases) {
      return foto
        ? `<img src="${foto}" class="${clases} object-cover">`
        : `<div class="${clases} flex items-center justify-center" style="background:#fef2f2">${camIcon}</div>`;
    }

    function renderLista() {
      const el = document.getElementById('listaGremios');
      if (gremios.length === 0) {
        el.innerHTML = '<p class="text-sm text-gray-400 py-2">No hay especialidades. Añade una abajo.</p>';
        return;
      }
      el.innerHTML = gremios.map(g => {
        if (editandoId === g.id) {
          return `
            <div class="flex items-center gap-3 py-3">
              <label class="cursor-pointer flex-shrink-0">
                <input type="file" accept="image/*" class="hidden" onchange="cambiarFotoEdicion(${g.id}, this)">
                <div class="w-12 h-12 rounded-xl overflow-hidden border-2 border-dashed border-red-300 hover:border-red-400 transition">
                  ${fotoThumb(g.foto, 'w-12 h-12 rounded-xl')}
                </div>
              </label>
              <input id="inputEdit" type="text" value="${g.nombre.replace(/"/g,'&quot;')}"
                class="flex-1 border border-red-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"
                onkeydown="if(event.key==='Enter') guardarEdicion(${g.id}); if(event.key==='Escape') cancelarEdicion()">
              <button onclick="guardarEdicion(${g.id})" class="p-1.5 rounded-lg text-green-500 hover:bg-green-50 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
              </button>
              <button onclick="cancelarEdicion()" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-50 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>`;
        }
        return `
          <div class="flex items-center gap-3 py-3">
            <div class="w-12 h-12 rounded-xl overflow-hidden flex-shrink-0">
              ${fotoThumb(g.foto, 'w-12 h-12 rounded-xl')}
            </div>
            <span class="flex-1 text-sm text-gray-700">${g.nombre}</span>
            <button onclick="iniciarEdicion(${g.id})" class="p-1.5 rounded-lg text-gray-400 hover:bg-blue-50 hover:text-blue-500 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button onclick="eliminarGremio(${g.id})" class="p-1.5 rounded-lg text-gray-400 hover:bg-red-50 hover:text-red-500 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>`;
      }).join('');

      if (editandoId !== null) setTimeout(() => document.getElementById('inputEdit')?.focus(), 30);
    }

    async function cargarGremios() {
      gremios = await DB.getGremios();
      renderLista();
    }

    async function iniciarEdicion(id) {
      const g = gremios.find(x => x.id === id);
      if (!g) return;
      const defectos = await DB.getDefectos();
      if (defectos.some(d => d.gremio === g.nombre)) {
        alert(`No se puede editar "${g.nombre}" porque tiene defectos asociados.`);
        return;
      }
      snapEdit = { ...g };
      editandoId = id;
      renderLista();
    }

    function cancelarEdicion() {
      if (snapEdit) {
        const idx = gremios.findIndex(x => x.id === editandoId);
        if (idx >= 0) gremios[idx] = snapEdit;
      }
      editandoId = null; snapEdit = null;
      renderLista();
    }

    function cambiarFotoEdicion(id, input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        const idx = gremios.findIndex(x => x.id === id);
        if (idx >= 0) gremios[idx].foto = e.target.result;
        renderLista();
      };
      reader.readAsDataURL(input.files[0]);
    }

    async function guardarEdicion(id) {
      const input = document.getElementById('inputEdit');
      if (!input) return;
      const nuevo = input.value.trim();
      if (!nuevo) { alert('El nombre no puede estar vacío'); return; }
      const g = gremios.find(x => x.id === id);
      try {
        await DB.updateGremio(id, nuevo, g?.foto || null);
        editandoId = null; snapEdit = null;
        await cargarGremios();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    async function eliminarGremio(id) {
      const g = gremios.find(x => x.id === id);
      if (!g) return;
      const defectos = await DB.getDefectos();
      if (defectos.some(d => d.gremio === g.nombre)) {
        alert(`No se puede eliminar "${g.nombre}" porque tiene defectos asociados.`);
        return;
      }
      if (!confirm(`¿Eliminar "${g.nombre}"?`)) return;
      try {
        await DB.deleteGremio(id);
        await cargarGremios();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    function previewFotoNueva(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        fotoNueva = e.target.result;
        document.getElementById('previewNueva').innerHTML =
          `<img src="${fotoNueva}" class="w-12 h-12 object-cover">`;
      };
      reader.readAsDataURL(input.files[0]);
    }

    async function agregarGremio() {
      const input = document.getElementById('inputNuevo');
      const nombre = input.value.trim();
      if (!nombre) return;
      if (gremios.some(g => g.nombre.toLowerCase() === nombre.toLowerCase())) {
        alert('Ya existe esa especialidad'); return;
      }
      try {
        await DB.addGremio(nombre, fotoNueva);
        input.value = '';
        fotoNueva = null;
        document.getElementById('previewNueva').innerHTML = camIcon;
        document.getElementById('fotoNuevaInput').value = '';
        await cargarGremios();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    cargarGremios();
  </script>
</body>
</html>
