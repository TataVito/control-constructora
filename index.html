<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Constructora — RVC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { rvc: { DEFAULT: '#C1272D', dark: '#A01F24', light: '#D94F54' } } } }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <header class="bg-rvc text-white px-4 py-3 shadow">
    <div class="flex items-center gap-3">
      <img src="rvc.jpg" alt="RVC" class="h-11 w-11 rounded-lg object-contain bg-white p-0.5 flex-shrink-0">
      <div>
        <p class="text-red-200 text-xs">RVC Constructora</p>
        <h1 class="text-lg font-bold leading-tight">Control de Obra</h1>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pt-5">

    <!-- KPIs globales -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="bg-white rounded-xl shadow-sm p-4 text-center">
        <div class="text-3xl font-bold text-red-500" id="kpiAbiertos">—</div>
        <div class="text-xs text-gray-500 mt-1">Abiertos</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 text-center">
        <div class="text-3xl font-bold text-yellow-500" id="kpiEnProceso">—</div>
        <div class="text-xs text-gray-500 mt-1">En proceso</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 text-center">
        <div class="text-3xl font-bold text-green-500" id="kpiCerrados">—</div>
        <div class="text-xs text-gray-500 mt-1">Cerrados</div>
      </div>
    </div>

    <!-- Progreso general -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
      <div class="flex justify-between text-sm mb-2">
        <span class="font-medium text-gray-700">Progreso de cierre</span>
        <span class="text-gray-500" id="pctLabel">0%</span>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-3">
        <div id="barProgreso" class="h-3 rounded-full transition-all" style="width:0%;background:#22c55e"></div>
      </div>
    </div>

    <!-- Por gremio -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
      <h2 class="font-semibold text-gray-700 mb-3">Por gremio</h2>
      <div id="resumenGremios" class="space-y-2">
        <p class="text-sm text-gray-400">Cargando...</p>
      </div>
    </div>

    <!-- Acceso análisis -->
    <a href="analisis.html" class="bg-white rounded-xl shadow-sm p-4 mb-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:#fef2f2">
          <svg class="w-5 h-5" fill="none" stroke="#C1272D" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </div>
        <div>
          <p class="font-semibold text-gray-700 text-sm">Análisis detallado</p>
          <p class="text-xs text-gray-400">KPIs, tiempos y zonas críticas</p>
        </div>
      </div>
      <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </a>

    <!-- Últimos defectos -->
    <div class="bg-white rounded-xl shadow-sm p-4">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-gray-700">Últimos defectos</h2>
        <a href="defectos.html" class="text-sm text-rvc">Ver todos</a>
      </div>
      <div id="ultimosDefectos">
        <p class="text-sm text-gray-400">Cargando...</p>
      </div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 z-10">
    <a href="index.html" class="flex flex-col items-center text-xs" style="color:#C1272D">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
      Inicio
    </a>
    <a href="defectos.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Defectos
    </a>
    <a href="analisis.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Análisis
    </a>
    <a href="gremios-admin.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      Gremios
    </a>
    <a href="nuevo.html" class="flex flex-col items-center text-xs text-gray-400">
      <div class="rounded-full p-1 -mt-4 shadow-lg" style="background:#C1272D">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      </div>
      Nuevo
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function render() {
      const todos = await DB.getDefectos();
      const abiertos  = todos.filter(d => d.estado === 'abierto').length;
      const enProceso = todos.filter(d => d.estado === 'en_proceso').length;
      const cerrados  = todos.filter(d => d.estado === 'cerrado').length;
      const total = todos.length;

      document.getElementById('kpiAbiertos').textContent  = abiertos;
      document.getElementById('kpiEnProceso').textContent = enProceso;
      document.getElementById('kpiCerrados').textContent  = cerrados;

      const pct = total ? Math.round((cerrados / total) * 100) : 0;
      document.getElementById('pctLabel').textContent = pct + '%';
      document.getElementById('barProgreso').style.width = pct + '%';

      const porGremio = {};
      todos.forEach(d => {
        if (!porGremio[d.gremio]) porGremio[d.gremio] = { total: 0, cerrados: 0 };
        porGremio[d.gremio].total++;
        if (d.estado === 'cerrado') porGremio[d.gremio].cerrados++;
      });
      const gremioEl = document.getElementById('resumenGremios');
      if (Object.keys(porGremio).length === 0) {
        gremioEl.innerHTML = '<p class="text-sm text-gray-400">No hay defectos registrados</p>';
      } else {
        gremioEl.innerHTML = Object.entries(porGremio).map(([g, v]) => {
          const p = Math.round((v.cerrados / v.total) * 100);
          return `<div>
            <div class="flex justify-between text-sm mb-1">
              <span class="text-gray-600">${g}</span>
              <span class="text-gray-400">${v.cerrados}/${v.total}</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-2">
              <div class="h-2 rounded-full" style="width:${p}%;background:#C1272D"></div>
            </div>
          </div>`;
        }).join('');
      }

      const ultimosEl = document.getElementById('ultimosDefectos');
      const ultimos = [...todos].reverse().slice(0, 3);
      if (ultimos.length === 0) {
        ultimosEl.innerHTML = '<p class="text-sm text-gray-400">No hay defectos registrados</p>';
      } else {
        ultimosEl.innerHTML = ultimos.map(d => `
          <a href="detalle.html?id=${d.id}" class="flex items-center justify-between py-2 border-b last:border-0">
            <div class="min-w-0 mr-2">
              <p class="text-sm font-medium text-gray-700 truncate">${d.descripcion}</p>
              <p class="text-xs text-gray-400">${d.gremio} · ${fmtDate(d.fecha)}</p>
            </div>
            ${badge(d.estado)}
          </a>`).join('');
      }
    }

    window.addEventListener('pageshow', () => render());
    window.addEventListener('focus', () => render());
    render();
  </script>
</body>
</html>
