<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Defecto — RVC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { rvc: { DEFAULT: '#C1272D', dark: '#A01F24', light: '#D94F54' } } } }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20">

  <header class="bg-rvc text-white px-4 py-3 shadow">
    <div class="flex items-center gap-3">
      <a href="defectos.html" class="text-red-200">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="rvc.jpg" alt="RVC" class="h-9 w-9 rounded-lg object-contain bg-white p-0.5 flex-shrink-0">
      <h1 class="text-lg font-bold" id="pageTitle">Nuevo defecto</h1>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pt-5 space-y-4">
    <div class="bg-white rounded-xl shadow-sm p-4 space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Descripción *</label>
        <textarea id="descripcion" rows="3" placeholder="Describe el defecto..."
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Gremio *</label>
        <select id="gremio" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 bg-white">
          <option value="">Selecciona gremio</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Zona / Ubicación *</label>
        <input id="zona" type="text" placeholder="Ej: Planta 3, Vivienda 12..."
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Estado</label>
        <div class="flex gap-2">
          <button type="button" id="btn_abierto"    onclick="setEstado('abierto')"    class="flex-1 py-2 rounded-lg border text-sm font-medium transition">Abierto</button>
          <button type="button" id="btn_en_proceso" onclick="setEstado('en_proceso')" class="flex-1 py-2 rounded-lg border text-sm font-medium transition">En proceso</button>
          <button type="button" id="btn_cerrado"    onclick="setEstado('cerrado')"    class="flex-1 py-2 rounded-lg border text-sm font-medium transition">Cerrado</button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Foto</label>
        <label class="block w-full border-2 border-dashed border-gray-200 rounded-lg p-4 text-center cursor-pointer hover:border-red-400 transition">
          <input type="file" id="foto" accept="image/*" capture="environment" class="hidden" onchange="previewFoto(this)">
          <div id="fotoPlaceholder">
            <svg class="w-8 h-8 mx-auto text-gray-300 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <p class="text-sm text-gray-400">Toca para añadir foto</p>
          </div>
          <img id="fotoPreview" class="hidden mx-auto max-h-48 rounded-lg object-cover">
        </label>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Notas adicionales</label>
        <textarea id="notas" rows="2" placeholder="Observaciones..."
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none"></textarea>
      </div>

    </div>

    <button onclick="guardar()" class="w-full text-white rounded-xl py-3 font-semibold text-sm shadow" style="background:#C1272D">
      Guardar defecto
    </button>

    <button id="btnEliminar" onclick="eliminar()" class="hidden w-full bg-red-50 border border-red-200 rounded-xl py-3 font-semibold text-sm" style="color:#C1272D">
      Eliminar defecto
    </button>

  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 z-10">
    <a href="index.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
      Inicio
    </a>
    <a href="defectos.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Defectos
    </a>
    <a href="analisis.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Análisis
    </a>
    <a href="gremios-admin.html" class="flex flex-col items-center text-xs text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      Gremios
    </a>
    <a href="nuevo.html" class="flex flex-col items-center text-xs" style="color:#C1272D">
      <div class="rounded-full p-1 -mt-4 shadow-lg" style="background:#C1272D">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      </div>
      Nuevo
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    var estadoSeleccionado = 'abierto';
    var fotoBase64 = null;
    var editId = null;
    var defectoOriginal = null;

    function setEstado(e) {
      estadoSeleccionado = e;
      ['abierto', 'en_proceso', 'cerrado'].forEach(function(est) {
        var btn = document.getElementById('btn_' + est);
        if (!btn) return;
        if (est === e) {
          btn.style.backgroundColor = '#C1272D';
          btn.style.color = '#fff';
          btn.style.borderColor = '#C1272D';
        } else {
          btn.style.backgroundColor = '#fff';
          btn.style.color = '#4b5563';
          btn.style.borderColor = '#e5e7eb';
        }
      });
    }

    function previewFoto(input) {
      if (!input.files || !input.files[0]) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        fotoBase64 = e.target.result;
        document.getElementById('fotoPlaceholder').classList.add('hidden');
        var img = document.getElementById('fotoPreview');
        img.src = fotoBase64;
        img.classList.remove('hidden');
      };
      reader.readAsDataURL(input.files[0]);
    }

    async function guardar() {
      var descripcion = document.getElementById('descripcion').value.trim();
      var gremio      = document.getElementById('gremio').value;
      var zona        = document.getElementById('zona').value.trim();
      var notas       = document.getElementById('notas').value.trim();

      if (!descripcion) { alert('Escribe una descripción'); return; }
      if (!gremio)      { alert('Selecciona el gremio'); return; }
      if (!zona)        { alert('Escribe la zona o ubicación'); return; }

      var defecto = {
        id:          editId || null,
        descripcion: descripcion,
        gremio:      gremio,
        zona:        zona,
        estado:      estadoSeleccionado,
        notas:       notas,
        foto:        fotoBase64,
        fecha:       defectoOriginal ? defectoOriginal.fecha : new Date().toISOString()
      };

      try {
        await DB.saveDefecto(defecto);
        window.location.href = 'defectos.html';
      } catch(e) {
        alert('Error al guardar: ' + e.message);
      }
    }

    async function eliminar() {
      if (!confirm('¿Eliminar este defecto?')) return;
      try {
        await DB.deleteDefecto(editId);
        window.location.href = 'defectos.html';
      } catch(e) {
        alert('Error al eliminar: ' + e.message);
      }
    }

    async function init() {
      const gremios = await DB.getGremios();
      var selGremio = document.getElementById('gremio');
      gremios.forEach(function(g) {
        var opt = document.createElement('option');
        opt.value = g.nombre; opt.textContent = g.nombre;
        selGremio.appendChild(opt);
      });

      var paramId = new URLSearchParams(window.location.search).get('id');
      if (paramId) {
        editId = parseInt(paramId);
        try {
          defectoOriginal = await DB.getDefecto(editId);
          const d = defectoOriginal;
          document.getElementById('pageTitle').textContent    = 'Editar defecto';
          document.getElementById('descripcion').value        = d.descripcion || '';
          document.getElementById('gremio').value             = d.gremio || '';
          document.getElementById('zona').value               = d.zona || '';
          document.getElementById('notas').value              = d.notas || '';
          setEstado(d.estado || 'abierto');
          if (d.foto) {
            fotoBase64 = d.foto;
            document.getElementById('fotoPlaceholder').classList.add('hidden');
            var img = document.getElementById('fotoPreview');
            img.src = d.foto;
            img.classList.remove('hidden');
          }
          document.getElementById('btnEliminar').classList.remove('hidden');
        } catch(e) {
          alert('Error al cargar el defecto');
        }
      } else {
        setEstado('abierto');
      }
    }

    init();
  </script>
</body>
</html>
